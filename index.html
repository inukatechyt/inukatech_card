        body {

            font-family: 'Space Mono', monospace;

        .btn-solid {

            color: white;
            transition: all 0.3s ease;
        }
        .btn-solid:hover {
            background: #ef4444;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.4);

    <script>
        lucide.createIcons();

        // Terminal Sequence
        const lines = document.querySelectorAll('.term-text');
        const tl = gsap.timeline();
        lines.forEach((line) => { tl.to(line, { opacity: 1, duration: 0.1, delay: 0.2 }); });
        tl.to("#boot-screen", { opacity: 0, duration: 0.5, delay: 0.4, onComplete: () => {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('main-card').classList.remove('hidden');
            gsap.fromTo("#main-card", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 1.2, ease: "power4.out" });
        }});

        // Tilt logic
        const card = document.getElementById('main-card');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 100;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 100;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Share API
        async function nativeShare() {
            if (navigator.share) {
                try { await navigator.share({ title: 'Inuka Sanjula | Inuka Tech', text: 'Connect with Inuka Sanjula - Software Developer & Graphic Designer', url: window.location.href }); } 
                catch (err) { console.log('Share dismissed'); }
            } else { alert("Link: " + window.location.href); }
        }

        // Contact Download
        function downloadVCF() {
            const vCard = `BEGIN:VCARD\nVERSION:3.0\nFN:Inuka Sanjula\nORG:Inuka Tech\nTITLE:Software Developer & Graphic Designer\nTEL;TYPE=CELL:+94717954374\nURL:https://inukatechyt.github.io/inukatech_card/\nEND:VCARD`;
            const blob = new Blob([vCard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Inuka_Sanjula.vcf';
            a.click();
        }
    </script>
